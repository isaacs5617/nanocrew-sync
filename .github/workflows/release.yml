name: Release

on:
  push:
    tags:
      - 'v*'          # e.g. v0.1.1, v0.2.0, v1.0.0-beta
  workflow_dispatch:  # allow manual runs from the Actions tab

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write  # needed to create/update the GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # Activate MSVC developer environment so cargo can find link.exe,
      # INCLUDE, LIB, etc. Without this, cargo's hardcoded link.exe path
      # guess is frequently off by a version and the build fails at link.
      - name: Setup MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # NASM is required by aws-lc-sys (pulled in transitively by aws-sdk-s3).
      - name: Install NASM
        uses: ilammy/setup-nasm@v1

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install WebView2 (preinstalled on windows-latest, but verify)
        run: |
          Get-ItemProperty -Path 'HKLM:\SOFTWARE\WOW6432Node\Microsoft\EdgeUpdate\Clients\*' -ErrorAction SilentlyContinue | Select-Object -First 1
        shell: pwsh

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      # winfsp-sys's build.rs reads HKLM\SOFTWARE\WOW6432Node\WinFsp\InstallDir
      # to find the WinFsp headers/libs, AND the Tauri resources bundler needs
      # apps/desktop/src-tauri/bundled/winfsp.msi present. The MSI is gitignored
      # (*.msi rule), so fetch it from the official release and place it at the
      # bundled/ path. Then install it silently so winfsp-sys can find it.
      - name: Download + install WinFsp
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $script = Join-Path $PWD 'apps/desktop/src-tauri/bundled/download-winfsp.ps1'
          & pwsh -File $script
          $msi = (Resolve-Path 'apps/desktop/src-tauri/bundled/winfsp.msi').Path
          Write-Host "Installing $msi..."
          $log = "$env:RUNNER_TEMP\winfsp-install.log"
          # ADDLOCAL=ALL forces install of every feature, including the
          # Developer headers (winfsp/winfsp.h) that bindgen needs. Without
          # this, msiexec installs only the runtime by default.
          $p = Start-Process msiexec.exe -ArgumentList @('/i', "`"$msi`"", 'ADDLOCAL=ALL', '/qn', '/norestart', '/l*v', "`"$log`"") -Wait -PassThru
          if ($p.ExitCode -ne 0) {
            Write-Host "--- msiexec log (last 100 lines) ---"
            Get-Content $log -Tail 100 -ErrorAction SilentlyContinue
            throw "WinFsp install failed with exit code $($p.ExitCode)"
          }
          Get-ItemProperty -Path 'HKLM:\SOFTWARE\WOW6432Node\WinFsp' -ErrorAction SilentlyContinue |
            Select-Object InstallDir, VersionMajor, VersionMinor
          # Verify headers are actually installed (root cause of the previous
          # bindgen failure — default silent install skipped Developer feature)
          $hdr = 'C:\Program Files (x86)\WinFsp\inc\winfsp\winfsp.h'
          if (-not (Test-Path $hdr)) {
            Write-Host "--- WinFsp install tree ---"
            Get-ChildItem 'C:\Program Files (x86)\WinFsp' -Recurse -ErrorAction SilentlyContinue |
              Select-Object FullName | Format-Table -AutoSize
            throw "WinFsp headers missing at $hdr — ADDLOCAL=ALL did not install Developer feature"
          }
          Write-Host "OK: found $hdr"

      - name: Build Tauri installers
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Rust's built-in MSVC detection hardcodes an absolute path to a
          # specific toolset version that isn't always present on the runner
          # image. ilammy/msvc-dev-cmd has already put link.exe on PATH, so
          # point Cargo at the on-PATH linker and skip the brittle auto-lookup.
          CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER: link.exe
          # The runner image pre-sets CC_x86_64_pc_windows_msvc to an absolute
          # path inside "C:\Program Files (x86)\...\BuildTools\..." that (a)
          # doesn't exist on this image (it ships VS Enterprise) and (b) breaks
          # cc-rs's tokenizer on the unquoted space in "Program Files". Force
          # cc-rs to use cl.exe from PATH — msvc-dev-cmd has already put the
          # correct Enterprise toolchain there.
          CC_x86_64_pc_windows_msvc: cl.exe
          CXX_x86_64_pc_windows_msvc: cl.exe
        run: pnpm tauri build

      - name: Collect artifacts
        shell: pwsh
        run: |
          $bundleDir = "apps/desktop/src-tauri/target/release/bundle"
          New-Item -Force -ItemType Directory -Path artifacts | Out-Null

          # NSIS EXE + its signature. Rename spaces→dots so the local
          # filename matches what GitHub stores as the release asset name
          # (GitHub auto-replaces spaces with dots on upload, which would
          # otherwise break the URL in latest.json).
          Get-ChildItem "$bundleDir/nsis" -Include *.exe,*.exe.sig -Recurse -ErrorAction SilentlyContinue |
            ForEach-Object {
              $new = $_.Name -replace ' ', '.'
              Copy-Item $_.FullName -Destination "artifacts/$new"
            }

          # MSI + signature (Tauri generates signatures for both)
          Get-ChildItem "$bundleDir/msi" -Include *.msi,*.msi.sig -Recurse -ErrorAction SilentlyContinue |
            ForEach-Object {
              $new = $_.Name -replace ' ', '.'
              Copy-Item $_.FullName -Destination "artifacts/$new"
            }

          # Build the latest.json updater manifest the app fetches from GitHub Releases
          $tag     = "${{ github.ref_name }}"
          $version = $tag -replace '^v',''
          $exeSig  = Get-ChildItem artifacts -Filter *.exe.sig | Select-Object -First 1
          $exe     = Get-ChildItem artifacts -Filter *.exe     | Where-Object { $_.Name -notlike '*.sig' } | Select-Object -First 1

          if (-not $exeSig) { throw "No .exe.sig found — did updater signing run?" }

          $sigContent = Get-Content $exeSig.FullName -Raw
          $pubDate    = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $downloadUrl = "https://github.com/${{ github.repository }}/releases/download/$tag/$($exe.Name)"

          $manifest = @{
            version   = $version
            notes     = "See the release notes on GitHub."
            pub_date  = $pubDate
            platforms = @{
              "windows-x86_64" = @{
                signature = $sigContent.Trim()
                url       = $downloadUrl
              }
            }
          }

          $manifest | ConvertTo-Json -Depth 6 | Set-Content -Path artifacts/latest.json -Encoding utf8

          Write-Host "Artifacts:"
          Get-ChildItem artifacts | Format-Table Name, Length

      - name: Upload build artifacts (for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ github.ref_name }}
          path: artifacts/
          retention-days: 30

      - name: Create / update GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/*.exe
            artifacts/*.exe.sig
            artifacts/*.msi
            artifacts/*.msi.sig
            artifacts/latest.json
          generate_release_notes: true
